name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11']
    
    defaults:
      run:
        working-directory: ./backend
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: backend/requirements.txt
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov black flake8
    
    - name: Run black format check
      run: |
        black --check --diff app/ || echo "Black formatting issues found (non-blocking for now)"
    
    - name: Run flake8 linting
      run: |
        # E501: line too long (ignore for now, common in prompts/strings)
        # W503: line break before binary operator (black compatibility)
        flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics || echo "Critical linting issues found (non-blocking for now)"
        flake8 app/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Run pytest
      env:
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY || 'test-key-for-ci' }}
      run: |
        # Run tests with coverage
        pytest -v --cov=app --cov-report=term --cov-report=xml
    
    - name: Upload coverage to artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: backend/coverage.xml
        retention-days: 30
    
    - name: Test Summary
      if: always()
      run: |
        echo "✅ Backend tests completed"
        echo "Check the test results above for details"
